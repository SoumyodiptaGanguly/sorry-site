<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I’m Sorry 💜</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      max-width: 420px;
      width: 90%;
      position: relative;
    }

    h1 {
      color: #8e44ad;
    }

    p {
      color: #4a235a;
      line-height: 1.6;
    }

    button {
      margin: 10px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .main-btn {
      background: linear-gradient(45deg, #ff6ec4, #7873f5);
      color: white;
    }

    .yes {
      background: linear-gradient(45deg, #ff6ec4, #ff9a9e);
      color: white;
    }

    .no {
      background-color: #dcd6f7;
      color: #4a235a;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<div class="card">
  <h1>I’m really sorry 😔</h1>
  
  <p>
    I know I messed up… and I hate that I hurt you.  
    You mean too much to me for me to act carelessly.
  </p>

  <button class="main-btn" onclick="handleClick()">
    Click if you're still mad at me 💔
  </button>

  <div id="next" class="hidden">
    <p>
      I promise I’ll do better.  
      Can you forgive me? 🥺
    </p>

    <div class="button-container">
      <button class="yes" onclick="forgive()">Yes 💜</button>
      <button class="no" id="noBtn"
        onmouseover="moveButton()" 
        onclick="moveButton()">
        No 🙄
      </button>
    </div>
  </div>
</div>

<script>
function handleClick() {
  document.getElementById("next").classList.remove("hidden");
  playMusic();
}

function playMusic() {
  const music = document.getElementById("bgMusic");
  music.play().catch(() => {});
}

function forgive() {
  document.body.innerHTML = `
    <div style="
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      flex-direction:column;
      font-family:Segoe UI;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      text-align:center;
    ">
      <h1 style="color:#8e44ad;">YAYYY 💜</h1>
      <p style="font-size:18px; color:#4a235a;">
        I love you so much. Thank you for forgiving me 🥹
      </p>
    </div>
  `;
}

function moveButton() {
  const btn = document.getElementById("noBtn");

  // Break it out of layout completely
  btn.style.position = "fixed";

  const maxX = window.innerWidth - btn.offsetWidth;
  const maxY = window.innerHeight - btn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

// 💜 Floating hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.innerHTML = "💜";
  heart.style.position = "fixed";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.bottom = "0";
  heart.style.fontSize = "20px";
  heart.style.animation = "float 3s linear";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 3000);
}, 300);

const style = document.createElement('style');
style.innerHTML = `
@keyframes float {
  to {
    transform: translateY(-100vh);
    opacity: 0;
  }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
